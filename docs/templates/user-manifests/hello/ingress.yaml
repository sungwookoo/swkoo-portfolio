# Per-app cert via DNS-01 cluster-issuer. cert-manager issues + renews the
# Let's Encrypt cert for this exact host (~50s on first deploy, auto-renew
# at 60 days). At >10 hosted apps, consider switching to a shared wildcard
# instead — but at our scale per-app is the simplest pattern.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hello
  namespace: user-sample
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod-dns
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - sample-hello.apps.swkoo.kr
      secretName: hello-tls
  rules:
    - host: sample-hello.apps.swkoo.kr
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: hello
                port:
                  number: 80
