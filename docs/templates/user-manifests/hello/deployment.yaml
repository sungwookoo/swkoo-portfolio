apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello
  namespace: user-sample
  labels:
    app: hello
    swkoo.kr/user: sample
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hello
  template:
    metadata:
      labels:
        app: hello
        swkoo.kr/user: sample
    spec:
      containers:
        - name: hello
          # REPLACE: ghcr.io/<your-login>/<repo>:latest
          image: ghcr.io/CHANGEME/CHANGEME:latest
          # :latest + Always = next pod restart pulls the fresh build.
          imagePullPolicy: Always
          ports:
            # Match the port your app listens on (Dockerfile EXPOSE).
            # Defaults assume Node/Next.js (3000). Change if your app differs.
            - containerPort: 3000
              name: http
          # Resource requests/limits are filled in by the namespace LimitRange.
          securityContext:
            runAsNonRoot: true
            # uid 1000 = `node` user in node:*-alpine images. If your base
            # image uses a different non-root uid, change this to match.
            runAsUser: 1000
            allowPrivilegeEscalation: false
            # readOnlyRootFilesystem is intentionally OFF: most app frameworks
            # (Next.js .next/cache, Python __pycache__, Java JIT) need to
            # write at runtime. Turn back on only if your app is verified
            # read-only-safe.
            capabilities:
              drop: ["ALL"]
