name: Build and Push Containers

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'deploy/base/**'
  workflow_dispatch:

env:
  REGISTRY_HOST: ${{ secrets.OCI_REGISTRY_HOST }}
  NAMESPACE: ${{ secrets.OCI_TENANCY_NAMESPACE }}
  BACKEND_REPO: ${{ secrets.OCI_BACKEND_REPO }}
  FRONTEND_REPO: ${{ secrets.OCI_FRONTEND_REPO }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to OCI registry
        env:
          OCI_USERNAME: ${{ secrets.OCI_USERNAME }}
          OCI_AUTH_TOKEN: ${{ secrets.OCI_AUTH_TOKEN }}
        run: |
          if [ -z "$REGISTRY_HOST" ]; then
            echo "REGISTRY_HOST secret is required" >&2
            exit 1
          fi
          echo "$OCI_AUTH_TOKEN" | docker login "${REGISTRY_HOST}" --username "$OCI_USERNAME" --password-stdin

      - name: Build and push backend image
        run: |
          SHA_TAG="${GITHUB_SHA}"
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --file apps/backend/Dockerfile \
            --tag "${REGISTRY_HOST}/${NAMESPACE}/${BACKEND_REPO}:${SHA_TAG}" \
            --tag "${REGISTRY_HOST}/${NAMESPACE}/${BACKEND_REPO}:latest" \
            --push \
            apps/backend

      - name: Build and push frontend image
        run: |
          SHA_TAG="${GITHUB_SHA}"
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --file apps/frontend/Dockerfile \
            --tag "${REGISTRY_HOST}/${NAMESPACE}/${FRONTEND_REPO}:${SHA_TAG}" \
            --tag "${REGISTRY_HOST}/${NAMESPACE}/${FRONTEND_REPO}:latest" \
            --push \
            apps/frontend

      - name: Update deployment image tags
        run: |
          SHA_TAG="${GITHUB_SHA}"
          sed -i "s|image: ${REGISTRY_HOST}/${NAMESPACE}/${BACKEND_REPO}:.*|image: ${REGISTRY_HOST}/${NAMESPACE}/${BACKEND_REPO}:${SHA_TAG}|g" deploy/base/backend/deployment.yaml
          sed -i "s|image: ${REGISTRY_HOST}/${NAMESPACE}/${FRONTEND_REPO}:.*|image: ${REGISTRY_HOST}/${NAMESPACE}/${FRONTEND_REPO}:${SHA_TAG}|g" deploy/base/frontend/deployment.yaml

      - name: Commit and push manifest updates
        run: |
          if git diff --quiet deploy/base/backend/deployment.yaml deploy/base/frontend/deployment.yaml; then
            echo "No manifest changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add deploy/base/backend/deployment.yaml deploy/base/frontend/deployment.yaml
          git commit -m "chore: update image tags to ${GITHUB_SHA}"
          git push
