name: Build and Push Containers

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'deploy/base/**'
  workflow_dispatch:

env:
  REGISTRY_HOST: ${{ secrets.OCI_REGISTRY_HOST }}
  NAMESPACE: ${{ secrets.OCI_TENANCY_NAMESPACE }}
  BACKEND_REPO: ${{ secrets.OCI_BACKEND_REPO }}
  FRONTEND_REPO: ${{ secrets.OCI_FRONTEND_REPO }}

jobs:
  # D. Path filter: only rebuild the service whose code actually changed
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v5
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'apps/backend/**'
            frontend:
              - 'apps/frontend/**'

  backend:
    needs: changes
    # Run on backend code changes, or whenever the workflow is manually dispatched
    # (paths-filter reports "no changes" on workflow_dispatch, which would otherwise
    # block intentional manual re-runs).
    if: |
      needs.changes.outputs.backend == 'true' ||
      github.event_name == 'workflow_dispatch'
    # A. Native ARM runner — no QEMU emulation (cluster target is VM.Standard.A1.Flex, aarch64)
    runs-on: ubuntu-22.04-arm
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      - uses: docker/setup-buildx-action@v3

      - name: Log in to OCI registry
        env:
          OCI_USERNAME: ${{ secrets.OCI_USERNAME }}
          OCI_AUTH_TOKEN: ${{ secrets.OCI_AUTH_TOKEN }}
        run: |
          if [ -z "$REGISTRY_HOST" ]; then
            echo "REGISTRY_HOST secret is required" >&2
            exit 1
          fi
          echo "$OCI_AUTH_TOKEN" | docker login "${REGISTRY_HOST}" --username "$OCI_USERNAME" --password-stdin

      # B. build-push-action with GHA cache, scope=backend so caches don't evict each other.
      # ignore-error=true keeps transient GHA cache 5xx from killing successful builds.
      - uses: docker/build-push-action@v6
        with:
          context: apps/backend
          file: apps/backend/Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY_HOST }}/${{ env.NAMESPACE }}/${{ env.BACKEND_REPO }}:${{ github.sha }}
            ${{ env.REGISTRY_HOST }}/${{ env.NAMESPACE }}/${{ env.BACKEND_REPO }}:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend,ignore-error=true

  frontend:
    needs: changes
    if: |
      needs.changes.outputs.frontend == 'true' ||
      github.event_name == 'workflow_dispatch'
    # C. Parallel with backend — independent jobs on native ARM runners
    runs-on: ubuntu-22.04-arm
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      - uses: docker/setup-buildx-action@v3

      - name: Log in to OCI registry
        env:
          OCI_USERNAME: ${{ secrets.OCI_USERNAME }}
          OCI_AUTH_TOKEN: ${{ secrets.OCI_AUTH_TOKEN }}
        run: |
          if [ -z "$REGISTRY_HOST" ]; then
            echo "REGISTRY_HOST secret is required" >&2
            exit 1
          fi
          echo "$OCI_AUTH_TOKEN" | docker login "${REGISTRY_HOST}" --username "$OCI_USERNAME" --password-stdin

      - uses: docker/build-push-action@v6
        with:
          context: apps/frontend
          file: apps/frontend/Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY_HOST }}/${{ env.NAMESPACE }}/${{ env.FRONTEND_REPO }}:${{ github.sha }}
            ${{ env.REGISTRY_HOST }}/${{ env.NAMESPACE }}/${{ env.FRONTEND_REPO }}:latest
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend,ignore-error=true

  update-manifests:
    needs: [changes, backend, frontend]
    # Run if at least one build succeeded. Skipped/failed builds do not commit a stale tag.
    if: |
      always() &&
      (needs.backend.result == 'success' || needs.frontend.result == 'success')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      # If the build job ran and succeeded, always update the tag — regardless of
      # whether the trigger was a path-matching push or a manual workflow_dispatch.
      - name: Update backend image tag
        if: needs.backend.result == 'success'
        run: |
          SHA_TAG="${GITHUB_SHA}"
          sed -i "s|image: ${REGISTRY_HOST}/${NAMESPACE}/${BACKEND_REPO}:.*|image: ${REGISTRY_HOST}/${NAMESPACE}/${BACKEND_REPO}:${SHA_TAG}|g" deploy/base/backend/deployment.yaml

      - name: Update frontend image tag
        if: needs.frontend.result == 'success'
        run: |
          SHA_TAG="${GITHUB_SHA}"
          sed -i "s|image: ${REGISTRY_HOST}/${NAMESPACE}/${FRONTEND_REPO}:.*|image: ${REGISTRY_HOST}/${NAMESPACE}/${FRONTEND_REPO}:${SHA_TAG}|g" deploy/base/frontend/deployment.yaml

      - name: Commit and push manifest updates
        run: |
          if git diff --quiet deploy/base/backend/deployment.yaml deploy/base/frontend/deployment.yaml; then
            echo "No manifest changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add deploy/base/backend/deployment.yaml deploy/base/frontend/deployment.yaml
          git commit -m "chore: update image tags to ${GITHUB_SHA}"
          git push
