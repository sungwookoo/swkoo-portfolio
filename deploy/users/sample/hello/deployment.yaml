apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello
  namespace: user-sample
  labels:
    app: hello
    swkoo.kr/user: sample
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hello
  template:
    metadata:
      labels:
        app: hello
        swkoo.kr/user: sample
    spec:
      containers:
        - name: hello
          # whoami: tiny upstream-managed echo server, useful as a smoke target.
          image: traefik/whoami:v1.10
          ports:
            - containerPort: 80
              name: http
          # Resource requests/limits are filled in by the namespace LimitRange.
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
