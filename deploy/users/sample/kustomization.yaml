apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Per-user manifests pattern: namespace + tenant policies + apps/<name>/
# Copy this directory and rename "sample" to the friend's GitHub login when
# onboarding. Resource limits and the egress allow-list are intentionally
# tight; bump them only if a specific app needs more.
resources:
  - namespace.yaml
  - resource-quota.yaml
  - limit-range.yaml
  - network-policy.yaml
  - hello/deployment.yaml
  - hello/service.yaml
  - hello/ingress.yaml
