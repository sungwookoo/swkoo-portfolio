apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-notifications-cm
  namespace: argocd
data:
  # ── Service: where to send the webhook ───────────────────────────────
  # The token is read from argocd-notifications-secret (key:
  # argocd-webhook-secret-swkoo) and matched server-side by the backend
  # against ARGOCD_WEBHOOK_SECRET in swkoo-backend-env.
  service.webhook.swkoo-backend: |
    url: https://swkoo.kr/api/webhooks/argocd
    headers:
      - name: Content-Type
        value: application/json
      - name: X-Webhook-Secret
        value: $argocd-webhook-secret-swkoo

  # Discord webhook URL is read from argocd-notifications-secret
  # (key: discord-url) so the URL never lives in git.
  service.webhook.discord: |
    url: $discord-url
    headers:
      - name: Content-Type
        value: application/json

  # ── Triggers: when ArgoCD should fire a notification ─────────────────
  trigger.on-sync-succeeded: |
    - description: Application syncing has succeeded
      send: [swkoo-sync-succeeded]
      when: app.status.operationState != nil and app.status.operationState.phase in ['Succeeded']

  trigger.on-sync-failed: |
    - description: Application syncing has failed
      send: [swkoo-sync-failed]
      when: app.status.operationState != nil and app.status.operationState.phase in ['Error', 'Failed']

  trigger.on-health-degraded: |
    - description: Application health has degraded
      send: [swkoo-health-degraded]
      when: app.status.health.status == 'Degraded'

  # ── Templates: payload shape (matches backend's normalizeArgocd) ─────
  template.swkoo-sync-succeeded: |
    webhook:
      swkoo-backend:
        method: POST
        body: |
          {"app":"{{.app.metadata.name}}","revision":"{{.app.status.sync.revision}}","syncStatus":"{{.app.status.sync.status}}","healthStatus":"{{.app.status.health.status}}","eventType":"sync_succeeded"}
      discord:
        method: POST
        body: |
          {"embeds":[{"title":"✅ {{.app.metadata.name}} synced","description":"`{{printf "%.7s" .app.status.sync.revision}}` · {{.app.status.health.status}}","color":5763719}]}

  template.swkoo-sync-failed: |
    webhook:
      swkoo-backend:
        method: POST
        body: |
          {"app":"{{.app.metadata.name}}","revision":"{{.app.status.sync.revision}}","syncStatus":"{{.app.status.sync.status}}","healthStatus":"{{.app.status.health.status}}","eventType":"sync_failed"}
      discord:
        method: POST
        body: |
          {"embeds":[{"title":"❌ {{.app.metadata.name}} sync failed","description":"`{{printf "%.7s" .app.status.sync.revision}}` · phase {{.app.status.operationState.phase}}","color":15548997}]}

  template.swkoo-health-degraded: |
    webhook:
      swkoo-backend:
        method: POST
        body: |
          {"app":"{{.app.metadata.name}}","revision":"{{.app.status.sync.revision}}","syncStatus":"{{.app.status.sync.status}}","healthStatus":"{{.app.status.health.status}}","eventType":"health_degraded"}
      discord:
        method: POST
        body: |
          {"embeds":[{"title":"⚠️ {{.app.metadata.name}} health degraded","description":"sync `{{.app.status.sync.status}}` · health `{{.app.status.health.status}}`","color":16705372}]}
