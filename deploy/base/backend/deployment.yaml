apiVersion: apps/v1
kind: Deployment
metadata:
  name: swkoo-backend
  namespace: swkoo
  labels:
    app: swkoo-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: swkoo-backend
  template:
    metadata:
      labels:
        app: swkoo-backend
    spec:
      imagePullSecrets:
        - name: ocir-credentials
      containers:
        - name: backend
          image: nrt.ocir.io/nrznn4yiltsz/swkoo/backend:63415c91801856c2094fc0c6069dfcafe650dfd4
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: PORT
              value: "3000"
            # Alertmanager in-cluster URL. Defaults below assume kube-prometheus-stack;
            # confirm actual service name with: kubectl get svc -n monitoring
            # Common candidates:
            #   - alertmanager-operated.monitoring.svc.cluster.local:9093
            #   - alertmanager-main.monitoring.svc.cluster.local:9093
            # If Alertmanager requires auth, set ALERTMANAGER_AUTH_TOKEN via the
            # swkoo-backend-env Secret.
            - name: ALERTMANAGER_BASE_URL
              value: "http://alertmanager-operated.monitoring.svc.cluster.local:9093"
          envFrom:
            - secretRef:
                name: swkoo-backend-env
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
