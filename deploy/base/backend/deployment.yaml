apiVersion: apps/v1
kind: Deployment
metadata:
  name: swkoo-backend
  namespace: swkoo
  labels:
    app: swkoo-backend
spec:
  replicas: 1
  # Recreate (not RollingUpdate) because the SQLite PVC is ReadWriteOnce and
  # a single-node cluster can't attach the volume to a new Pod while the old
  # one still holds it. Trade-off: ~5s downtime on each backend rollout.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: swkoo-backend
  template:
    metadata:
      labels:
        app: swkoo-backend
    spec:
      serviceAccountName: swkoo-backend
      imagePullSecrets:
        - name: ocir-credentials
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: swkoo-backend-data
      containers:
        - name: backend
          image: nrt.ocir.io/nrznn4yiltsz/swkoo/backend:609175168f98f98178c4f1afe08eeac8aabc783a
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
          volumeMounts:
            - name: data
              mountPath: /data
          env:
            - name: PORT
              value: "3000"
            - name: OBSERVATORY_DB_PATH
              value: "/data/observatory.sqlite"
            # Alertmanager in-cluster URL. Defaults below assume kube-prometheus-stack;
            # confirm actual service name with: kubectl get svc -n monitoring
            # Common candidates:
            #   - alertmanager-operated.monitoring.svc.cluster.local:9093
            #   - alertmanager-main.monitoring.svc.cluster.local:9093
            # If Alertmanager requires auth, set ALERTMANAGER_AUTH_TOKEN via the
            # swkoo-backend-env Secret.
            - name: ALERTMANAGER_BASE_URL
              value: "http://alertmanager-operated.monitoring.svc.cluster.local:9093"
          envFrom:
            - secretRef:
                name: swkoo-backend-env
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
