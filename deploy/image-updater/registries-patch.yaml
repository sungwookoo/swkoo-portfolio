# Patches the upstream argocd-image-updater-config ConfigMap with our
# registry configuration. ghcr.io with anonymous pull is sufficient as
# long as friends keep their packages public. For private packages, add
# a credentials reference here pointing to a Secret with the friend's PAT.
apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-image-updater-config
data:
  log.level: info
  registries.conf: |
    registries:
      - name: GitHub Container Registry
        api_url: https://ghcr.io
        prefix: ghcr.io
        ping: yes
        default: true
