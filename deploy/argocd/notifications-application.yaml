apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: swkoo-argocd-config
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/sungwookoo/swkoo-portfolio.git
    targetRevision: main
    path: deploy/argocd-config
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
