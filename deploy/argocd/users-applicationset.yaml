# Phase 3.1: fans out deploy/users/<login>.yaml (registration files) into
# one Application per file. Each file points at a private deploy repo at
# `swkoo-deploy/<login>` that holds the actual k8s manifests. Friend's
# manifest data is no longer mixed into this (public) repo.
#
# Onboarding flow: swkoo.kr/deploy → backend creates swkoo-deploy/<login>,
# commits manifests there, then writes deploy/users/<login>.yaml here.
# ApplicationSet picks it up and materializes swkoo-user-<login>.
#
# Image Updater annotations on the template wire each Application up for
# auto-redeploy when the friend's GHCR image gets a new digest. See
# https://argocd-image-updater.readthedocs.io/.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: swkoo-users
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions:
    - missingkey=error
  # Image Updater patches /spec/source/kustomize/images on each new digest.
  # Without this, ApplicationSet would clobber that field on every refresh.
  ignoreApplicationDifferences:
    - jsonPointers:
        - /spec/source/kustomize/images
  generators:
    - git:
        repoURL: https://github.com/sungwookoo/swkoo-portfolio.git
        revision: main
        files:
          - path: deploy/users/*.yaml
  template:
    metadata:
      name: 'swkoo-user-{{ .login }}'
      annotations:
        # Image Updater: track one image per friend, write back into the
        # Application spec (no git commit). Update strategy is per-friend
        # via the registration file.
        # `digest` strategy needs the tag in the image-list value itself
        # (allow-tags isn't enough). Phase 1 convention: friends tag `:latest`.
        argocd-image-updater.argoproj.io/image-list: 'app={{ .image.repo }}:latest'
        argocd-image-updater.argoproj.io/app.update-strategy: '{{ .image.updateStrategy }}'
        argocd-image-updater.argoproj.io/write-back-method: argocd
        # Notifications (kept verbatim from the prior version).
        notifications.argoproj.io/subscribe.on-sync-succeeded.swkoo-backend: ""
        notifications.argoproj.io/subscribe.on-sync-failed.swkoo-backend: ""
        notifications.argoproj.io/subscribe.on-health-degraded.swkoo-backend: ""
        notifications.argoproj.io/subscribe.on-sync-succeeded.discord: ""
        notifications.argoproj.io/subscribe.on-sync-failed.discord: ""
        notifications.argoproj.io/subscribe.on-health-degraded.discord: ""
    spec:
      project: default
      source:
        repoURL: 'https://github.com/{{ .deployRepo }}.git'
        targetRevision: main
        path: .
      destination:
        server: https://kubernetes.default.svc
        namespace: 'user-{{ .login }}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
