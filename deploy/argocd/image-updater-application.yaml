apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: swkoo-image-updater
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/sungwookoo/swkoo-kr.git
    targetRevision: main
    path: deploy/image-updater
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
